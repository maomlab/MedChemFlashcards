name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.10
      - name: Sync dependencies
        run: uv sync --all-extras
      - name: Lint
        run: uv run nox -s lint
      - name: Typecheck
        run: uv run nox -s typecheck
      - name: Test
        run: uv run nox -s test
      - name: Export schema (must be up to date)
        run: |
          uv run nox -s schema
          git diff --exit-code schema/ || (echo "JSON Schema is stale; run 'nox -s schema'"; exit 1)
      - name: Ingest + QC
        run: |
          uv run medchem ingest
          uv run medchem qc

  frontend:
    runs-on: ubuntu-latest
    if: ${{ hashFiles('frontend/package.json') != '' }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
