name: Deploy to GitHub Pages

# Builds the SPA in static mode (precomputed content JSON, no backend) and
# publishes it to GitHub Pages. The base path is derived automatically:
#   - a user/org repo (<name>.github.io)  -> served at "/"
#   - any other repo (a project page)     -> served at "/<repo>/"

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.10
      - name: Sync Python deps
        run: uv sync

      - name: Export static content (QC-gated)
        run: uv run medchem export-static --out frontend/public/data

      - name: Derive Pages base path
        id: base
        run: |
          repo="${{ github.event.repository.name }}"
          if [[ "$repo" == *.github.io ]]; then
            echo "base=/" >> "$GITHUB_OUTPUT"
          else
            echo "base=/$repo/" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build SPA (static mode)
        working-directory: frontend
        env:
          VITE_STATIC: "1"
          VITE_BASE: ${{ steps.base.outputs.base }}
        run: |
          npm ci
          npm run build

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
